<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edward Kubiak</title>
    <script>
      // spa-github-pages redirect (rafgraph/spa-github-pages)
      // Encode path + search + hash into a query string so GitHub Pages 404
      // redirects back to index.html which can restore the original URL.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
