<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#111827" stroke="#334155" stroke-width="2"/>

  <!-- Subtle inner ring accent -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>

  <!-- E letterform - Space Mono inspired geometric -->
  <g fill="#f1f5f9">
    <!-- E vertical stroke -->
    <rect x="42" y="62" width="14" height="76" rx="2"/>
    <!-- E top bar -->
    <rect x="42" y="62" width="42" height="12" rx="2"/>
    <!-- E middle bar -->
    <rect x="42" y="94" width="36" height="12" rx="2"/>
    <!-- E bottom bar -->
    <rect x="42" y="126" width="42" height="12" rx="2"/>
  </g>

  <!-- K letterform -->
  <g fill="#fbbf24">
    <!-- K vertical stroke -->
    <rect x="98" y="62" width="14" height="76" rx="2"/>
    <!-- K upper diagonal -->
    <polygon points="112,100 112,88 158,62 158,78"/>
    <!-- K lower diagonal -->
    <polygon points="112,100 112,112 158,138 158,122"/>
  </g>

  <!-- Mountain/trail accent line under the letters -->
  <path d="M50 148 L72 140 L90 146 L110 136 L130 142 L150 134"
        stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="0.4"/>
</svg>
