name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Fetch GitHub activity and write static JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/users/ek33450505/events?per_page=30" \
            -o raw_events.json

          node << 'EOF'
          const fs = require('fs');
          const events = JSON.parse(fs.readFileSync('raw_events.json', 'utf8'));
          if (!Array.isArray(events)) {
            console.error('GitHub API did not return an array:', JSON.stringify(events).slice(0, 200));
            fs.writeFileSync('public/github-activity.json', JSON.stringify([]));
            process.exit(0);
          }
          const pushEvents = events
            .filter(e => e.type === 'PushEvent' && e.payload && e.payload.commits && e.payload.commits.length > 0)
            .slice(0, 5)
            .map(e => ({
              id: e.id,
              repo: e.repo.name.replace('ek33450505/', ''),
              repoFull: e.repo.name,
              message: e.payload.commits[0].message.split('\n')[0],
              time: e.created_at
            }));
          fs.writeFileSync('public/github-activity.json', JSON.stringify(pushEvents));
          console.log('Wrote', pushEvents.length, 'events');
          EOF

      - name: Fetch GitHub repo stars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const repos = [
            'project-engram',
            'claude-agent-team',
            'claude-code-dashboard',
            'cast-agents',
            'cast-observe',
            'cast-security',
            'cast-hooks',
            'cast-dash',
            'cast-memory',
            'cast-parallel',
            'forge',
            'JARVIS',
            'cast-claudes_journal',
            'promptbot',
          ];

          const token = process.env.GH_TOKEN;

          async function fetchStars(repo) {
            return new Promise((resolve) => {
              const options = {
                hostname: 'api.github.com',
                path: `/repos/ek33450505/${repo}`,
                headers: {
                  'User-Agent': 'github-actions',
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/vnd.github+json',
                },
              };
              https.get(options, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    resolve({ repo, stars: json.stargazers_count ?? 0 });
                  } catch {
                    resolve({ repo, stars: 0 });
                  }
                });
              }).on('error', () => resolve({ repo, stars: 0 }));
            });
          }

          (async () => {
            const results = await Promise.all(repos.map(fetchStars));
            const map = {};
            for (const { repo, stars } of results) {
              map[repo] = stars;
            }
            fs.writeFileSync('public/github-stars.json', JSON.stringify(map, null, 2));
            console.log('Wrote github-stars.json:', map);
          })();
          EOF

      - name: Fetch dev.to posts
        run: |
          curl -s "https://dev.to/api/articles?username=edwardkubiak&per_page=3" \
            -o raw_devto.json

          node << 'EOF'
          const fs = require('fs');
          let raw;
          try {
            raw = JSON.parse(fs.readFileSync('raw_devto.json', 'utf8'));
          } catch {
            raw = [];
          }
          if (!Array.isArray(raw)) {
            console.error('dev.to API did not return an array');
            fs.writeFileSync('public/devto-feed.json', JSON.stringify([]));
            process.exit(0);
          }
          const articles = raw.map(a => ({
            title: a.title,
            description: a.description,
            url: a.url,
            published_at: a.published_at,
            tag_list: a.tag_list,
          }));
          fs.writeFileSync('public/devto-feed.json', JSON.stringify(articles));
          console.log('Wrote', articles.length, 'dev.to articles');
          EOF

      - name: Build
        env:
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
